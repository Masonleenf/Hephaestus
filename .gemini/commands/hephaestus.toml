description = "Run Hephaestus to create/package Agentlas agents or open the ontology GUI."
prompt = """
# /hephaestus

Raw arguments:
{{args}}

Read `AGENTS.md`, `.agentlas/mode-map.json`, and
`.agentlas/global-commands.json`.

If the first argument is `ontology`, open the project ontology GUI by running
`./bin/hephaestus ontology --gui .` when the local shell command is available,
then report `gui_url`, `db_path`, `inbox_path`, and verification status.

If the first argument is not `ontology`, classify the request as
single-agent-builder, multi-agent-team-builder, or agentlas-packager. Generate
or repair the Agentlas package, verify it, and include the `global_commands`
section from `.agentlas/global-commands.json` in the final response.
"""
