description = "Route a request through the Hephaestus Network local-first router (cards, Hub fallback, approval gates)."
prompt = """
# /hephaestus-network

Raw arguments:
{{args}}

Use the Hephaestus Network local-first router.

1. Find the Hephaestus runner — first executable wins:
   `~/.agentlas/runtime/current/bin/hephaestus`, `./bin/hephaestus`, or the
   newest `~/.claude/plugins/cache/agentlas-core-engine/hephaestus/*/bin/hephaestus`
   (sort -V). Then run:
   `hephaestus route "{{args}}" --runtime gemini-cli`

2. Act on the JSON decision and never bypass it:
   - action "route": report the selected card and its canonical command. If an
     `approval_request` is present, ask the user to approve those capabilities
     before invoking anything.
   - action "clarify": ask the `clarify_question` with the candidates.
   - action "pipeline": execute `stages` in order behind per-stage approvals,
     saving artifacts under `handoff_dir`; stop and report on stage failure.
   - action "hub_fallback"/"hub_candidates": ask for explicit approval first —
     only redacted keywords are ever sent to the Hub, never the raw prompt.
     After approval, re-run with `--approve-hub`.
   - action "propose_new": offer to build a new agent via /hephaestus.
   - action "refuse": explain the reasons (loop guard or privacy block).

3. Hard rules: local memory stays local unless the user explicitly approves an
   export; high-risk capabilities (file writes, cloud calls, payments,
   publishing, deletion, private data export, external tools) always require a
   user approval; include the routing `receipt_id` in the final response.
"""
