<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agentlas Meta-Agent Architecture Decomposition</title>
  <desc id="desc">A paper-style architecture diagram showing request classification, three core builders, generated package contracts, memory curation, skill lifecycle, runtime adapters, and four sync surfaces.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1f4e79"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .paper { fill: #fbfcfe; stroke: #c8d3df; stroke-width: 1.4; }
      .layer { fill: #f4f7fb; stroke: #8aa3bd; stroke-width: 1.2; }
      .layer2 { fill: #f7faf7; stroke: #9ab58c; stroke-width: 1.2; }
      .layer3 { fill: #fffaf2; stroke: #c9a45c; stroke-width: 1.2; }
      .box { fill: #ffffff; stroke: #1d2b3a; stroke-width: 1.4; }
      .boxBlue { fill: #eef6ff; stroke: #1f4e79; stroke-width: 1.5; }
      .boxGreen { fill: #f1f8f1; stroke: #39733c; stroke-width: 1.5; }
      .boxGold { fill: #fff8e8; stroke: #9a6a13; stroke-width: 1.5; }
      .boxRed { fill: #fff3f3; stroke: #9b2f2f; stroke-width: 1.5; }
      .dash { fill: none; stroke: #596b7d; stroke-width: 1.2; stroke-dasharray: 7 6; }
      .arrow { stroke: #1f4e79; stroke-width: 1.7; marker-end: url(#arrow); fill: none; }
      .arrowThin { stroke: #3b637f; stroke-width: 1.25; marker-end: url(#arrow); fill: none; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #14202b; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #425466; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #1b2c3a; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #102030; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #293f52; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #4c5d6b; }
      .code { font: 600 13px Menlo, Consolas, monospace; fill: #243648; }
      .num { font: 700 16px Arial, Helvetica, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1180"/>
  <rect class="paper" x="34" y="34" width="1532" height="1112" rx="18"/>

  <text class="title" x="70" y="82">Figure 1. Agentlas Meta-Agent Architecture Decomposition</text>
  <text class="subtitle" x="70" y="112">The public core turns a rough request or existing agent workspace into an installable, memory-aware Agentlas package.</text>

  <g>
    <circle cx="82" cy="168" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="174">1</text>
    <rect class="layer" x="110" y="142" width="1210" height="86" rx="12"/>
    <text class="section" x="130" y="169">Input surface</text>
    <rect class="box" x="130" y="184" width="210" height="34" rx="7"/>
    <text class="small" x="151" y="206">rough agent idea</text>
    <rect class="box" x="365" y="184" width="210" height="34" rx="7"/>
    <text class="small" x="386" y="206">existing prompt</text>
    <rect class="box" x="600" y="184" width="210" height="34" rx="7"/>
    <text class="small" x="620" y="206">agent/team repo</text>
    <rect class="box" x="835" y="184" width="210" height="34" rx="7"/>
    <text class="small" x="855" y="206">Claude/Codex setup</text>
    <rect class="box" x="1070" y="184" width="280" height="34" rx="7"/>
    <text class="small" x="1090" y="206">OpenClaw/Hermes workspace</text>
  </g>

  <g>
    <circle cx="82" cy="292" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="298">2</text>
    <rect class="layer" x="110" y="252" width="1210" height="118" rx="12"/>
    <text class="section" x="130" y="280">Request shaping</text>
    <rect class="boxBlue" x="184" y="300" width="270" height="48" rx="8"/>
    <text class="label" x="210" y="330">Mode classifier</text>
    <rect class="boxBlue" x="534" y="300" width="270" height="48" rx="8"/>
    <text class="label" x="562" y="330">Clarify question loop</text>
    <rect class="boxBlue" x="884" y="300" width="270" height="48" rx="8"/>
    <text class="label" x="908" y="330">Root router / handoff</text>
    <path class="arrow" d="M454 324 H534"/>
    <path class="arrow" d="M804 324 H884"/>
    <text class="tiny" x="190" y="362">classify before generation</text>
    <text class="tiny" x="540" y="362">ask only package-shaping questions</text>
    <text class="tiny" x="890" y="362">select exactly one builder</text>
  </g>

  <path class="arrow" d="M710 228 V252"/>
  <path class="arrow" d="M1019 370 V406"/>

  <g>
    <circle cx="82" cy="446" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="452">3</text>
    <rect class="layer2" x="110" y="406" width="1210" height="154" rx="12"/>
    <text class="section" x="130" y="434">Three core builders</text>

    <rect class="boxGreen" x="150" y="462" width="335" height="82" rx="9"/>
    <text class="label" x="173" y="490">10-single-agent-builder</text>
    <text class="small" x="173" y="514">one installable worker</text>
    <text class="tiny" x="173" y="534">skills, memory contracts, adapters</text>

    <rect class="boxGreen" x="535" y="462" width="335" height="82" rx="9"/>
    <text class="label" x="558" y="490">20-multi-agent-team-builder</text>
    <text class="small" x="558" y="514">orchestrator, workers, gates</text>
    <text class="tiny" x="558" y="534">PM Soul, Memory Curator, policy, eval, QA</text>

    <rect class="boxGreen" x="920" y="462" width="335" height="82" rx="9"/>
    <text class="label" x="943" y="490">30-agentlas-packager</text>
    <text class="small" x="943" y="514">repair or convert existing material</text>
    <text class="tiny" x="943" y="534">public/private cleanup and install surfaces</text>
  </g>

  <path class="arrowThin" d="M317 544 C317 585 480 586 480 618"/>
  <path class="arrowThin" d="M702 544 V618"/>
  <path class="arrowThin" d="M1087 544 C1087 585 880 586 880 618"/>

  <g>
    <circle cx="82" cy="650" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="656">4</text>
    <rect class="layer" x="110" y="606" width="1210" height="212" rx="12"/>
    <text class="section" x="130" y="634">Generated Agent OS package</text>

    <rect class="box" x="140" y="662" width="260" height="144" rx="9"/>
    <text class="label" x="162" y="690">Canonical core</text>
    <text class="code" x="162" y="715">AGENTS.md</text>
    <text class="code" x="162" y="737">agents/ skills/ modes/</text>
    <text class="code" x="162" y="759">schemas/ templates/</text>
    <text class="tiny" x="162" y="785">runtime-neutral source of truth</text>

    <rect class="boxGold" x="430" y="662" width="280" height="144" rx="9"/>
    <text class="label" x="452" y="690">.agentlas state</text>
    <text class="code" x="452" y="715">mode-map.json</text>
    <text class="code" x="452" y="737">agent-card.json</text>
    <text class="code" x="452" y="759">company-blueprint.json</text>
    <text class="code" x="452" y="781">activation.json</text>

    <rect class="boxBlue" x="740" y="662" width="280" height="144" rx="9"/>
    <text class="label" x="762" y="690">Runtime adapters</text>
    <text class="code" x="762" y="715">.claude/ claude/</text>
    <text class="code" x="762" y="737">codex/ .gemini/</text>
    <text class="code" x="762" y="759">Claude Code, Codex, Gemini</text>
    <text class="tiny" x="762" y="785">thin mirrors over canonical core</text>

    <rect class="boxRed" x="1050" y="662" width="270" height="144" rx="9"/>
    <text class="label" x="1072" y="690">Verification</text>
    <text class="code" x="1072" y="715">verify-package.sh</text>
    <text class="code" x="1072" y="737">public_safety_check.sh</text>
    <text class="tiny" x="1072" y="764">missing files, stale IDs</text>
    <text class="tiny" x="1072" y="786">private paths and secret patterns</text>
  </g>

  <path class="arrow" d="M705 818 V850"/>

  <g>
    <circle cx="82" cy="890" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="896">5</text>
    <rect class="layer3" x="110" y="850" width="1210" height="128" rx="12"/>
    <text class="section" x="130" y="878">Memory and governance decomposition</text>

    <rect class="boxGold" x="145" y="904" width="205" height="54" rx="8"/>
    <text class="label" x="166" y="927">PM Soul</text>
    <text class="tiny" x="166" y="947">decisions, risks, open loops</text>

    <rect class="boxGold" x="395" y="904" width="205" height="54" rx="8"/>
    <text class="label" x="416" y="927">Worker emitters</text>
    <text class="tiny" x="416" y="947">Memory Events only</text>

    <rect class="boxGold" x="645" y="904" width="220" height="54" rx="8"/>
    <text class="label" x="666" y="927">Memory Tickets</text>
    <text class="tiny" x="666" y="947">idempotency, trust, ACK state</text>

    <rect class="boxGold" x="910" y="904" width="210" height="54" rx="8"/>
    <text class="label" x="931" y="927">Memory Curator</text>
    <text class="tiny" x="931" y="947">redact, dedup, route, resolve</text>

    <rect class="boxGold" x="1160" y="904" width="155" height="54" rx="8"/>
    <text class="label" x="1180" y="927">Vault refs</text>
    <text class="tiny" x="1180" y="947">secret names only</text>

    <path class="arrowThin" d="M350 931 H395"/>
    <path class="arrowThin" d="M600 931 H645"/>
    <path class="arrowThin" d="M865 931 H910"/>
    <path class="arrowThin" d="M1120 931 H1160"/>
  </g>

  <path class="arrow" d="M705 978 V1008"/>

  <g>
    <circle cx="82" cy="1044" r="18" fill="#1f4e79"/>
    <text class="num" x="77" y="1050">6</text>
    <rect class="layer2" x="110" y="1008" width="1210" height="98" rx="12"/>
    <text class="section" x="130" y="1034">Skill lifecycle and runtime promotion</text>

    <rect class="boxGreen" x="375" y="1050" width="170" height="42" rx="8"/>
    <text class="small" x="400" y="1076">candidate skills</text>
    <rect class="boxGreen" x="590" y="1050" width="180" height="42" rx="8"/>
    <text class="small" x="618" y="1076">skill registry</text>
    <rect class="boxGreen" x="815" y="1050" width="185" height="42" rx="8"/>
    <text class="small" x="842" y="1076">trial evidence</text>
    <rect class="boxGreen" x="1045" y="1050" width="215" height="42" rx="8"/>
    <text class="small" x="1068" y="1076">Curator decision gate</text>
    <path class="arrowThin" d="M545 1071 H590"/>
    <path class="arrowThin" d="M770 1071 H815"/>
    <path class="arrowThin" d="M1000 1071 H1045"/>
    <text class="tiny" x="132" y="1088">export default: first-class recall disabled</text>
  </g>

  <g>
    <rect class="dash" x="1348" y="142" width="118" height="944" rx="12"/>
    <text class="section" x="1366" y="174">Sync</text>
    <text class="section" x="1366" y="196">surfaces</text>

    <rect class="box" x="1363" y="232" width="88" height="58" rx="7"/>
    <text class="tiny" x="1375" y="256">Public</text>
    <text class="tiny" x="1375" y="274">core</text>

    <rect class="box" x="1363" y="322" width="88" height="58" rx="7"/>
    <text class="tiny" x="1375" y="346">Hosted</text>
    <text class="tiny" x="1375" y="364">Web</text>

    <rect class="box" x="1363" y="412" width="88" height="58" rx="7"/>
    <text class="tiny" x="1375" y="436">Desktop</text>
    <text class="tiny" x="1375" y="454">Terminal</text>

    <rect class="box" x="1363" y="502" width="88" height="58" rx="7"/>
    <text class="tiny" x="1375" y="526">AppBridge</text>
    <text class="tiny" x="1375" y="544">adapter</text>

    <path class="arrowThin" d="M1320 705 H1363"/>
    <text class="tiny" x="1358" y="602">public core owns</text>
    <text class="tiny" x="1358" y="620">contracts;</text>
    <text class="tiny" x="1358" y="638">runtimes own</text>
    <text class="tiny" x="1358" y="656">implementation.</text>
  </g>
</svg>
